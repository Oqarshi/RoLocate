name: RoLocate Check
# dont need eslint
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check JS syntax
        run: node --check RoLocate.userscript.js

      - name: Check userscript metadata
        run: |
          HEADER=$(head -n 50 RoLocate.userscript.js)
          MISSING=""
          for FIELD in "@name" "@namespace" "@version" "@description" "@match" "@author" "@license" "@grant"; do
            echo "$HEADER" | grep -q "$FIELD" || MISSING="$MISSING $FIELD"
          done
          if [ ! -z "$MISSING" ]; then
            echo "❌ Missing metadata fields:$MISSING"
            exit 1
          else
            echo "✅ All required metadata fields present"
          fi
