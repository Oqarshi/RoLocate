name: Userscript Check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ESLint
        run: npm install eslint

      - name: Run syntax check
        run: node --check RoLocate.userscript.js

      - name: Run ESLint
        run: npx eslint RoLocate.userscript.js
        # test idk if this will work
